name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, without leading v (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS archs build on native runners so node-gyp produces the
          # correct-arch node-mac-auth addon, which the binary then embeds.
          - runner: macos-14
            target: bun-darwin-arm64
            asset: tpay-darwin-arm64
            ext: zip
          # Intel build cross-compiles on the free Apple Silicon runner;
          # scripts/build.ts rebuilds the node-mac-auth addon for x64.
          # (GitHub retired the macos-13 Intel runner.)
          - runner: macos-14
            target: bun-darwin-x64
            asset: tpay-darwin-x64
            ext: zip
          # Linux has no native addon, so both archs cross-compile from x64.
          - runner: ubuntu-latest
            target: bun-linux-x64
            asset: tpay-linux-x64
            ext: tar.gz
          - runner: ubuntu-latest
            target: bun-linux-arm64
            asset: tpay-linux-arm64
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >>"$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >>"$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run scripts/build.ts --target ${{ matrix.target }} --outfile dist/tpay --version ${{ steps.version.outputs.value }}

      - name: Archive
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip -j "../${{ matrix.asset }}.zip" tpay
          else
            tar -czf "../${{ matrix.asset }}.tar.gz" tpay
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: true
